name: Weekly Matchy Generation

on:
  schedule:
    # Run every Wednesday at 5 PM PST (1 AM UTC Thursday)
    - cron: '0 1 * * 3'
  workflow_dispatch: # Allow manual triggering

jobs:
  generate-matchy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Matchy Generation
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            ${{ secrets.RAILWAY_WEBHOOK_URL }}/matchy-scheduled
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
